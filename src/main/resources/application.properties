# Server
server.port=${SERVER_PORT}

# App
app.base-url=${APP_BASE_URL}

# Primary DB (Clientes - MySQL)
spring.datasource.primary.url=${DATABASE_PRIMARY_URL}
spring.datasource.primary.username=${DATABASE_PRIMARY_USERNAME}
spring.datasource.primary.password=${DATABASE_PRIMARY_PASSWORD}
spring.datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.primary.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.primary.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.primary.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.primary.hikari.connection-test-query=SELECT 1

# Secondary DB (Proveedores/Productos - MySQL)
spring.datasource.secondary.url=${DATABASE_SECONDARY_URL}
spring.datasource.secondary.username=${DATABASE_SECONDARY_USERNAME}
spring.datasource.secondary.password=${DATABASE_SECONDARY_PASSWORD}
spring.datasource.secondary.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.secondary.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.secondary.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.secondary.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.secondary.hikari.connection-test-query=SELECT 1

# JPA
spring.jpa.open-in-view=false

# JWT
secret.key.jwt=${SECRET_KEY_JWT}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:true}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}

# Rate Limiting (login)
rate.limit.max-attempts=${RATE_LIMIT_MAX_ATTEMPTS:5}
rate.limit.window-ms=${RATE_LIMIT_WINDOW_MS:900000}

# Rate Limiting (correo de recuperaciĂłn)
rate.limit.email.max-attempts=${RATE_LIMIT_EMAIL_MAX_ATTEMPTS:3}
rate.limit.email.window-ms=${RATE_LIMIT_EMAIL_WINDOW_MS:3600000}

# JWT Expirations
jwt.expiration.auth-ms=${JWT_EXPIRATION_AUTH_MS:28800000}
jwt.expiration.email-validation-ms=${JWT_EXPIRATION_EMAIL_VALIDATION_MS:86400000}
jwt.expiration.password-reset-ms=${JWT_EXPIRATION_PASSWORD_RESET_MS:3600000}

# Phone Verification OTP
phone.verification.expiration-ms=${PHONE_OTP_EXPIRATION_MS:300000}

# MinIO / S3
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretKey=${AWS_SECRET_KEY}
aws.region=${AWS_REGION:us-east-1}
aws.endpoint=${AWS_ENDPOINT:http://localhost:9000}
aws.public-endpoint=${AWS_PUBLIC_ENDPOINT:http://localhost:9000}
aws.s3.bucket=${AWS_S3_BUCKET:agroenvios-clientes}

# MercadoPago
mp.access.token=${MP_ACCESS_TOKEN:}
mp.webhook.secret=${MP_WEBHOOK_SECRET:}

allowed.origins=${ALLOWED_ORIGINS:}

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.agro.clientes=${LOG_LEVEL_APP:DEBUG}

mp.webhook.skip-validation=${MP_WEBHOOK_SKIP_VALIDATION:false}
